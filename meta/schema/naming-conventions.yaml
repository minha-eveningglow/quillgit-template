# File/ID Naming Conventions

file_naming:
  style: kebab-case
  examples:
    - merchant-lord-early.md
    - dark-alley-chase.md
    - world-magic-system.md
  forbidden:
    - camelCase
    - PascalCase
    - snake_case
    - spaces in filenames

id_prefixes:
  character: "char-"
  world: "world-"
  relationship: "rel-"
  glossary: "gloss-"
  timeline_event: "tl-"
  scene_design: "sd-"
  scene: "scene-"
  structure: "struct-"
  writing: "draft-"
  lore: "lore-"
  game: "game-"
  commentary: "cmnt-"
  feedback: "fb-"
  note: "note-"
  media: "media-"
  prompt: "prompt-"

frontmatter_required_fields:
  all:
    - id
    - type
    - status
    - title
  scene:
    - id
    - type
    - status
    - title
    - pov_character
  character:
    - id
    - type
    - status
    - title
    - tier
  structure:
    - id
    - type
    - status
    - title
    - structure_type
  timeline_event:
    - id
    - type
    - status
    - title
    - year
    - axis
