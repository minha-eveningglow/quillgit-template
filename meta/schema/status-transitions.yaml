# Creative Object Status Transition Rules
# Disallowed transitions will trigger a warning during validation

statuses:
  - raw
  - suggested
  - candidate
  - edited
  - canon
  - question
  - deferred
  - deprecated
  - draft
  - reviewed

transitions:
  raw:
    to: [suggested, candidate, question, deferred, deprecated]
  suggested:
    to: [candidate, edited, question, deferred, deprecated]
  candidate:
    to: [edited, canon, question, deferred, deprecated]
  edited:
    to: [candidate, canon, question, deferred, deprecated]
  canon:
    to: [deprecated]
  question:
    to: [raw, suggested, candidate, deferred, deprecated]
  deferred:
    to: [raw, suggested, candidate, question, deprecated]
  deprecated:
    to: []
  draft:
    to: [reviewed, edited, deprecated]
  reviewed:
    to: [edited, canon, deprecated]

rules:
  - description: Transition to canon requires user confirmation
    from: [candidate, edited, reviewed]
    to: canon
    requires: user_confirmation
  - description: Cannot revert from deprecated
    from: deprecated
    to: []
