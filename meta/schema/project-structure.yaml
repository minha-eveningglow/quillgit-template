# Quillgit Project Directory Structure Definition
# The validation script references this file for structure verification

directories:
  required:
    - path: candidates
      description: Work in progress / under review
      children:
        - characters
        - world
        - relationships
        - glossary
        - timeline
        - scenes
        - structure
        - writings
        - subdocs
        - notes
        - game
        - feedback
        - validation
    - path: canon
      description: Finalized
      children:
        - characters
        - world
        - relationships
        - glossary
        - timeline
        - scenes
        - structure
        - writings
        - subdocs
    - path: deprecated
      description: Retired
    - path: media
      description: Media references
      children:
        - references
        - generated
        - external-links
        - selected
        - canon-visuals
        - moodboards
    - path: meta
      description: Project settings
      children:
        - context
        - schema
        - templates
        - prompts

folder_status_rules:
  canon:
    allowed_statuses: [canon]
  candidates:
    allowed_statuses: [suggested, candidate, edited, draft, reviewed, raw, question, deferred]
  deprecated:
    allowed_statuses: [deprecated]
