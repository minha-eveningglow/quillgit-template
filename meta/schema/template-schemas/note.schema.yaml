# Note Document Frontmatter Validation Schema

type: object
required:
  - id
  - type
  - status
properties:
  id:
    type: string
    pattern: "^note-[a-z0-9-]+$"
  type:
    type: string
    enum: [note]
  status:
    type: string
    enum: [raw, promoted, archived]
  title:
    type: string
  related_to:
    type: array
    items:
      type: string
  tags:
    type: array
    items:
      type: string
  created_at:
    type: string
    format: date-time
