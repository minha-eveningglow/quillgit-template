# Commentary Document Frontmatter Validation Schema

type: object
required:
  - id
  - type
  - target_type
  - target_id
properties:
  id:
    type: string
    pattern: "^commentary-[a-z0-9-]+$"
  type:
    type: string
    enum: [commentary]
  target_type:
    type: string
    enum: [character, world, scene, relationship]
  target_id:
    type: string
  topic:
    type: string
  source:
    type: string
    enum: [manual, ai_extracted]
  status:
    type: string
    enum: [raw, suggested, candidate, edited, canon, deprecated]
  title:
    type: string
  tags:
    type: array
    items:
      type: string
  created_at:
    type: string
    format: date-time
