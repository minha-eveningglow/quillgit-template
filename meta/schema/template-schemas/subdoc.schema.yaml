# Subdoc (Supplementary Document) Frontmatter Validation Schema

type: object
required:
  - id
  - type
  - status
  - title
properties:
  id:
    type: string
    pattern: "^subdoc-[a-z0-9-]+$"
  type:
    type: string
    enum: [subdoc]
  status:
    type: string
    enum: [raw, suggested, candidate, edited, canon, deprecated]
  title:
    type: string
  description:
    type: string
  parent_type:
    type: string
  parent_id:
    type: string
  tags:
    type: array
    items:
      type: string
  related_characters:
    type: array
    items:
      type: string
  related_world_rules:
    type: array
    items:
      type: string
